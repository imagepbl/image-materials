# In-use product stock, in process 7 in CIRCOMOD material cycle system definition,
# by end-use sector and by product type
- Product Stock|Transportation|{Vehicles}:
    description: Number of (Vehicles) currently in use, S_7 - In-use stock of
      (Building Types)
    unit: thousand
- Product Stock|Buildings|{Building Types}:
    description: Useful floor space of (Building Types) currently in use, S_7 -
      In-use stock of (Building Types)
    unit: m^2
    notes: If not specified differently, this includes useful floor space of
      permanently occupied building units only
- Product Stock|Transportation Infrastructure|{Mobility Infrastructure Types}:
    description: Total length (if unit is km) or area (if unit is km^2) of {Mobility Infrastructure Types} currently in use,
      S_7 - In-use stock of {Mobility Infrastructure Types}
    unit: "{Mobility Infrastructure Types}"
